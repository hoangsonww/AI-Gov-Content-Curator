version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      MONGODB_URI: "${MONGODB_URI}"
      GOOGLE_AI_API_KEY: "${GOOGLE_AI_API_KEY}"
      AI_INSTRUCTIONS: "${AI_INSTRUCTIONS}"
      NEWS_API_KEY: "${NEWS_API_KEY}"
      CRAWL_URLS: "${CRAWL_URLS}"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3000"
    restart: unless-stopped

  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    environment:
      PORT: "3000"
      MONGODB_URI: "${MONGODB_URI}"
      GOOGLE_AI_API_KEY: "${GOOGLE_AI_API_KEY}"
      GOOGLE_AI_API_KEY1: "${GOOGLE_AI_API_KEY1}"
      GOOGLE_AI_API_KEY2: "${GOOGLE_AI_API_KEY2}"
      GOOGLE_AI_API_KEY3: "${GOOGLE_AI_API_KEY3}"
      AI_INSTRUCTIONS: "${AI_INSTRUCTIONS}"
      NEWS_API_KEY: "${NEWS_API_KEY}"
      NEWS_API_KEY1: "${NEWS_API_KEY1}"
      CRAWL_URLS: "${CRAWL_URLS}"
    restart: unless-stopped

  newsletters:
    build:
      context: ./newsletters
      dockerfile: Dockerfile
    ports:
      - "3003:3000"
    environment:
      PORT: "3000"
      MONGODB_URI: "${MONGODB_URI}"
      RESEND_API_KEY: "${RESEND_API_KEY}"
      RESEND_FROM: "${RESEND_FROM}"
      UNSUBSCRIBE_BASE_URL: "${UNSUBSCRIBE_BASE_URL}"
      AICC_API_URL: "${AICC_API_URL}"
    restart: unless-stopped

  # Splunk OpenTelemetry Collector (local dev log & trace forwarding)
  otel-collector:
    image: quay.io/signalfx/splunk-otel-collector:0.96.1
    container_name: otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "13133:13133" # Health check
      - "8888:8888"   # Collector metrics
    environment:
      SPLUNK_HEC_TOKEN: "${SPLUNK_HEC_TOKEN:-00000000-0000-0000-0000-000000000000}"
      SPLUNK_HEC_ENDPOINT: "${SPLUNK_HEC_ENDPOINT:-https://localhost:8088/services/collector}"
      SPLUNK_CONFIG: /etc/otel/config.yaml
    volumes:
      - ./infrastructure/kubernetes/monitoring/otel-local-config.yaml:/etc/otel/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13133/"]
      interval: 30s
      timeout: 5s
      retries: 3
